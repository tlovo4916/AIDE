services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "30001:8000"
    environment:
      AIDE_DATABASE_URL: "postgresql+asyncpg://aide:aide@postgres:5432/aide"
      AIDE_CHROMA_PERSIST_DIR: "/app/workspace/.chroma"
      AIDE_WORKSPACE_DIR: "/app/workspace"
      AIDE_DEBUG: "true"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - workspace_data:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aide
      POSTGRES_PASSWORD: aide
      POSTGRES_DB: aide
    ports:
      - "30003:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aide"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "30002:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "30000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  chromadata:
  workspace_data:
